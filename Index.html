<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Hub | Buy.NSW Style Prototype</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">

    <nav class="bg-white border-b border-slate-200 py-4 px-6 flex justify-between items-center shadow-xs">
        <div class="flex items-center gap-3">
            <span class="bg-blue-800 text-white font-black text-xs px-2.5 py-1 rounded tracking-wider uppercase">NSW</span>
            <span class="font-bold text-slate-800 text-lg tracking-tight">buy.nsw <span class="text-slate-400 font-normal">Supplier Hub</span></span>
        </div>
        <div class="text-xs bg-slate-100 text-slate-600 px-3 py-1 rounded-full font-medium">
            Prototype Environment
        </div>
    </nav>

    <div class="max-w-6xl w-full mx-auto p-4 sm:p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-4 bg-white p-6 rounded-2xl border border-slate-200/80 shadow-xs mb-2">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Supplier list</h1>
            <p class="text-sm text-slate-500 mt-1" id="supplierCount">Loading active vendor registry...</p>
            
            <div class="mt-4 max-w-xl">
                <div class="relative">
                    <input type="text" id="searchInput" oninput="filterSuppliers()" placeholder="Search by keyword, ABN, or supplier name..." 
                           class="w-full bg-slate-50 border border-slate-300 rounded-xl pl-4 pr-12 py-3 text-sm focus:outline-none focus:border-blue-700 focus:bg-white transition shadow-inner">
                    <span class="absolute right-4 top-3.5 text-slate-400 text-sm">🔍</span>
                </div>
            </div>
        </div>

        <div class="lg:col-span-1 bg-white p-5 rounded-2xl border border-slate-200/80 shadow-xs h-fit">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Refine Search</h2>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-2">Supply Categories</label>
                    <div class="space-y-2 text-sm text-slate-600">
                        <label class="flex items-center gap-2 cursor-pointer hover:text-blue-800"><input type="checkbox" value="Construction" onchange="filterSuppliers()" class="rounded text-blue-800 focus:ring-blue-700"> Construction</label>
                        <label class="flex items-center gap-2 cursor-pointer hover:text-blue-800"><input type="checkbox" value="Building and property" onchange="filterSuppliers()" class="rounded text-blue-800 focus:ring-blue-700"> Building & Property</label>
                        <label class="flex items-center gap-2 cursor-pointer hover:text-blue-800"><input type="checkbox" value="Information and technology" onchange="filterSuppliers()" class="rounded text-blue-800 focus:ring-blue-700"> Info & Tech</label>
                        <label class="flex items-center gap-2 cursor-pointer hover:text-blue-800"><input type="checkbox" value="Marketing and advertising" onchange="filterSuppliers()" class="rounded text-blue-800 focus:ring-blue-700"> Marketing</label>
                    </div>
                </div>

                <hr class="border-slate-100">

                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-2">Special Identifiers</label>
                    <label class="flex items-center gap-2 cursor-pointer text-sm text-slate-600 hover:text-blue-800">
                        <input type="checkbox" id="fasterPaymentsFilter" onchange="filterSuppliers()" class="rounded text-blue-800 focus:ring-blue-700">
                        ⚡ Faster Payments
                    </label>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 space-y-3" id="supplierListContainer">
            </div>

    </div>

    <script>
        // Mock dataset pulled straight from real buy.nsw registry frameworks
        const suppliers = [
            { name: "LDL PLUMBING PTY LTD", date: "25 Jun 2026", category: "Construction", sub: "Bridges and tunnels", fasterPayments: true },
            { name: "CLEARFLOW INFRASTRUCTURE PTY LTD", date: "24 Jun 2026", category: "Construction", sub: "Building and property", fasterPayments: false },
            { name: "DILIGERE SOLUTIONS PTY. LTD.", date: "25 Jun 2026", category: "Information and technology", sub: "Cloud products and support", fasterPayments: true },
            { name: "IRONBARK FILMS PTY LTD", date: "23 Jun 2026", category: "Marketing and advertising", sub: "Advertising production", fasterPayments: true },
            { name: "JOHN PYE REAL ESTATE", date: "25 Jun 2026", category: "Building and property", sub: "Housing and homelessness solutions", fasterPayments: true },
            { name: "NOW WATT ELECTRICAL SOLUTIONS PTY LTD", date: "22 Jun 2026", category: "Construction", sub: "Building and property", fasterPayments: false }
        ];

        function filterSuppliers() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const checkedCategories = Array.from(document.querySelectorAll('input[type="checkbox"]:checked'))
                                           .map(cb => cb.value)
                                           .filter(v => v !== 'on'); // Filter out faster payments checkbox value
            const requireFasterPayments = document.getElementById('fasterPaymentsFilter').checked;

            const container = document.getElementById('supplierListContainer');
            container.innerHTML = '';

            // Filter logic matching multi-tier inputs
            const filtered = suppliers.filter(supplier => {
                const matchesSearch = supplier.name.toLowerCase().includes(searchQuery) || supplier.sub.toLowerCase().includes(searchQuery);
                const matchesCategory = checkedCategories.length === 0 || checkedCategories.includes(supplier.category);
                const matchesPayments = !requireFasterPayments || supplier.fasterPayments;
                
                return matchesSearch && matchesCategory && matchesPayments;
            });

            // Update Counter Status
            document.getElementById('supplierCount').innerText = `${filtered.length} total suppliers matching criteria`;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="bg-white border border-slate-200 text-center py-12 rounded-2xl text-slate-400 text-sm">
                        No registered entities match your exact filtering query.
                    </div>
                `;
                return;
            }

            // Build official listing cards
            filtered.forEach(supplier => {
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200 hover:border-blue-600/40 p-5 rounded-2xl transition shadow-xs flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4";
                
                card.innerHTML = `
                    <div class="space-y-1">
                        <h3 class="font-extrabold text-blue-900 text-base tracking-tight hover:underline cursor-pointer">${supplier.name}</h3>
                        <p class="text-xs font-mono text-slate-400">Updated: ${supplier.date} • <span class="text-slate-600 font-sans">${supplier.sub}</span></p>
                        <div class="pt-1">
                            <span class="bg-slate-100 text-slate-700 text-[10px] px-2.5 py-1 rounded font-medium border border-slate-200">
                                ${supplier.category}
                            </span>
                        </div>
                    </div>
                    
                    ${supplier.fasterPayments ? `
                        <div class="flex items-center gap-1.5 bg-emerald-50 border border-emerald-200 text-emerald-800 text-[11px] font-semibold px-3 py-1 rounded-full shrink-0 shadow-2xs">
                            <span class="text-emerald-500">⚡</span> Registered for faster payments
                        </div>
                    ` : ''}
                `;
                container.appendChild(card);
            });
        }

        // Initialize setup presentation view on load
        filterSuppliers();
    </script>
</body>
</html>
